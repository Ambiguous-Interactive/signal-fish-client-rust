# Panic-free policy enforcement.
#
# Runs on every PR and push to main. Uses the guard script to scan for
# forbidden panic-prone patterns in library/example code and runs Clippy
# with the deny-level lints configured in Cargo.toml.
#
# Jobs:
#   panic-free-policy — grep-based scan + Clippy hard-fail lints

name: No Panics

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  panic-free-policy:
    name: Panic-free policy check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Run panic-free policy check
        run: bash scripts/check-no-panics.sh

  required:
    name: No Panics Required
    if: ${{ always() }}
    needs: [panic-free-policy]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require panic-free policy
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failures=$(jq -r 'to_entries[] | select(.value.result != "success") | "\(.key)=\(.value.result)"' <<< "$NEEDS_JSON")
          if [ -n "$failures" ]; then
            printf '::error::Required jobs did not succeed:\n%s\n' "$failures"
            exit 1
          fi
