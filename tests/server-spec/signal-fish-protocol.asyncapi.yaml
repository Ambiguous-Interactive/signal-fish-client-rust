# Signal Fish Protocol — machine-readable AsyncAPI 3.0 spec
# ===========================================================
#
# This is the SOURCE-OF-TRUTH, codegen-friendly description of the Signal Fish
# WebSocket signaling protocol. The signaling wire format is JSON over
# WebSocket; every text message is a `{ "type": <Variant>, "data": <payload> }` envelope (serde
# `#[serde(tag = "type", content = "data")]`). Variants WITHOUT a payload
# (e.g. LeaveRoom, Ping, RoomLeft, Pong) are sent as `{ "type": <Variant> }`
# with no `data` field. `GameDataBinary` is the one physical binary-frame
# exception and is modeled explicitly as a MessagePack map below.
#
# It models EVERY `ClientMessage` (send / client -> server) and `ServerMessage`
# (receive / server -> client) variant from `src/protocol/messages.rs`, plus the
# full `ErrorCode` enum from `src/protocol/error_codes.rs`. A Rust consistency
# test — `tests/protocol_spec_consistency.rs` — fails the build if this file
# drifts from those Rust types, so codegen consumers can trust it.
#
# ---------------------------------------------------------------------------
# HOW TO USE FOR CODEGEN
# ---------------------------------------------------------------------------
# * AsyncAPI generator (TypeScript / Java / Python / etc. models + clients):
#       npx @asyncapi/generator spec/signal-fish-protocol.asyncapi.yaml \
#         @asyncapi/typescript-template -o ./generated
#   See https://www.asyncapi.com/tools/generator for the template list.
#
# * Pure JSON-Schema model generators: every message `payload` below is a plain
#   JSON Schema (the `components.schemas.*` subtree is self-contained). Point a
#   JSON-Schema-based generator (quicktype, json-schema-to-typescript, schemafy
#   for Rust, etc.) at the `components/schemas` block, e.g.:
#       npx quicktype --src-lang schema --lang rust \
#         <(yq '.components.schemas' spec/signal-fish-protocol.asyncapi.yaml)
#
# * Discriminator: the `type` field is the discriminator on both the
#   `ClientMessage` and `ServerMessage` unions (see `components.messages.*` and
#   the `oneOf` wrappers `ClientMessageEnvelope` / `ServerMessageEnvelope`).
#
# ---------------------------------------------------------------------------
# PROTOCOL VERSION FLOOR (v2) vs CAPABILITY UPGRADE (v3)
# ---------------------------------------------------------------------------
# * v2 is the RELAY FLOOR every client MUST implement. The mandatory flow is
#   Authenticate -> JoinRoom -> PlayerReady -> StartGame -> GameStarting ->
#   GameData -> LeaveRoom. The server relays GameData through the WebSocket.
# * v3 is an OPTIONAL upgrade that adds capability negotiation
#   (`supported_transports` / `supported_topologies` / `protocol_version` on
#   Authenticate) plus the peer-to-peer messages: Signal, SessionPlan, NewPeer,
#   TransportStatus, PeerTransportStatus. v3 messages are tagged `x-protocol: v3`
#   below. SessionPlan is version-gated: v3 members receive an explicit
#   relay/relay plan when no upgrade rung fits, while v2 members never receive
#   any v3 message.
# * v3 ALSO adds relay delivery classes and accountability (there is no separate
#   v4 — v3 is the single unshipped "current" version). Client GameData may
#   request reliable, keyed-latest, or volatile delivery. The server stamps
#   relayed GameData / GameDataBinary with a per-(sender, room) `seq` +
#   incarnation `epoch` (v3 recipients only — pre-v3 (v2) recipients' bytes are
#   unchanged), and sends exact, causally-prioritized DeliveryReport gap ranges
#   for class-policy loss. Opt-in RelayStats remains the aggregate diagnostic
#   surface. See the ServerGameData and DeliveryReport schema descriptions for
#   the normative wording. The server's default negotiation ceiling is 3
#   (`protocol.max_protocol_version`).
# See docs/concepts/protocol-versions.md and docs/guides/building-a-client.md.

asyncapi: 3.0.0

info:
  title: Signal Fish Signaling Protocol
  version: 0.3.0
  description: |
    JSON-over-WebSocket signaling protocol for peer-to-peer game networking.
    v2 relay floor + optional v3 capability negotiation / WebRTC signaling +
    v3 delivery classes, relay sequencing (GameData.seq/epoch), exact
    DeliveryReport accountability, and aggregate RelayStats diagnostics.
  license:
    name: MIT

defaultContentType: application/json

servers:
  v2:
    host: 'localhost:8080'
    pathname: /v2/ws
    protocol: ws
    description: v2 relay-floor endpoint. Default negotiated protocol version is 2.
  v3:
    host: 'localhost:8080'
    pathname: /v3/ws
    protocol: ws
    description: |
      v3 endpoint. Defaults the omitted Authenticate.protocol_version to 3, but a
      client is relay-only unless it also advertises supported_transports /
      supported_topologies. Server clamps to its configured protocol range.

channels:
  signaling:
    address: /
    description: The single bidirectional WebSocket channel carrying all messages.
    messages:
      # ----- send: client -> server -----
      Authenticate: { $ref: '#/components/messages/Authenticate' }
      JoinRoom: { $ref: '#/components/messages/JoinRoom' }
      LeaveRoom: { $ref: '#/components/messages/LeaveRoom' }
      ClientGameData: { $ref: '#/components/messages/ClientGameData' }
      ClientSignal: { $ref: '#/components/messages/ClientSignal' }
      AuthorityRequest: { $ref: '#/components/messages/AuthorityRequest' }
      PlayerReady: { $ref: '#/components/messages/PlayerReady' }
      StartGame: { $ref: '#/components/messages/StartGame' }
      ProvideConnectionInfo: { $ref: '#/components/messages/ProvideConnectionInfo' }
      Ping: { $ref: '#/components/messages/Ping' }
      Reconnect: { $ref: '#/components/messages/Reconnect' }
      JoinAsSpectator: { $ref: '#/components/messages/JoinAsSpectator' }
      LeaveSpectator: { $ref: '#/components/messages/LeaveSpectator' }
      TransportStatus: { $ref: '#/components/messages/TransportStatus' }
      # ----- receive: server -> client -----
      Authenticated: { $ref: '#/components/messages/Authenticated' }
      ProtocolInfo: { $ref: '#/components/messages/ProtocolInfo' }
      AuthenticationError: { $ref: '#/components/messages/AuthenticationError' }
      RoomJoined: { $ref: '#/components/messages/RoomJoined' }
      RoomJoinFailed: { $ref: '#/components/messages/RoomJoinFailed' }
      RoomLeft: { $ref: '#/components/messages/RoomLeft' }
      PlayerJoined: { $ref: '#/components/messages/PlayerJoined' }
      PlayerLeft: { $ref: '#/components/messages/PlayerLeft' }
      ServerGameData: { $ref: '#/components/messages/ServerGameData' }
      GameDataBinary: { $ref: '#/components/messages/GameDataBinary' }
      AuthorityChanged: { $ref: '#/components/messages/AuthorityChanged' }
      AuthorityResponse: { $ref: '#/components/messages/AuthorityResponse' }
      LobbyStateChanged: { $ref: '#/components/messages/LobbyStateChanged' }
      GameStarting: { $ref: '#/components/messages/GameStarting' }
      ServerSignal: { $ref: '#/components/messages/ServerSignal' }
      NewPeer: { $ref: '#/components/messages/NewPeer' }
      SessionPlan: { $ref: '#/components/messages/SessionPlan' }
      Pong: { $ref: '#/components/messages/Pong' }
      Reconnected: { $ref: '#/components/messages/Reconnected' }
      ReconnectionFailed: { $ref: '#/components/messages/ReconnectionFailed' }
      PlayerReconnected: { $ref: '#/components/messages/PlayerReconnected' }
      SpectatorJoined: { $ref: '#/components/messages/SpectatorJoined' }
      SpectatorJoinFailed: { $ref: '#/components/messages/SpectatorJoinFailed' }
      SpectatorLeft: { $ref: '#/components/messages/SpectatorLeft' }
      NewSpectatorJoined: { $ref: '#/components/messages/NewSpectatorJoined' }
      SpectatorDisconnected: { $ref: '#/components/messages/SpectatorDisconnected' }
      Error: { $ref: '#/components/messages/Error' }
      PeerTransportStatus: { $ref: '#/components/messages/PeerTransportStatus' }
      RelayStats: { $ref: '#/components/messages/RelayStats' }
      GoingAway: { $ref: '#/components/messages/GoingAway' }
      DeliveryReport: { $ref: '#/components/messages/DeliveryReport' }

operations:
  sendToServer:
    action: send
    channel: { $ref: '#/channels/signaling' }
    title: Client -> Server messages (ClientMessage)
    messages:
      - { $ref: '#/channels/signaling/messages/Authenticate' }
      - { $ref: '#/channels/signaling/messages/JoinRoom' }
      - { $ref: '#/channels/signaling/messages/LeaveRoom' }
      - { $ref: '#/channels/signaling/messages/ClientGameData' }
      - { $ref: '#/channels/signaling/messages/ClientSignal' }
      - { $ref: '#/channels/signaling/messages/AuthorityRequest' }
      - { $ref: '#/channels/signaling/messages/PlayerReady' }
      - { $ref: '#/channels/signaling/messages/StartGame' }
      - { $ref: '#/channels/signaling/messages/ProvideConnectionInfo' }
      - { $ref: '#/channels/signaling/messages/Ping' }
      - { $ref: '#/channels/signaling/messages/Reconnect' }
      - { $ref: '#/channels/signaling/messages/JoinAsSpectator' }
      - { $ref: '#/channels/signaling/messages/LeaveSpectator' }
      - { $ref: '#/channels/signaling/messages/TransportStatus' }
  receiveFromServer:
    action: receive
    channel: { $ref: '#/channels/signaling' }
    title: Server -> Client messages (ServerMessage)
    messages:
      - { $ref: '#/channels/signaling/messages/Authenticated' }
      - { $ref: '#/channels/signaling/messages/ProtocolInfo' }
      - { $ref: '#/channels/signaling/messages/AuthenticationError' }
      - { $ref: '#/channels/signaling/messages/RoomJoined' }
      - { $ref: '#/channels/signaling/messages/RoomJoinFailed' }
      - { $ref: '#/channels/signaling/messages/RoomLeft' }
      - { $ref: '#/channels/signaling/messages/PlayerJoined' }
      - { $ref: '#/channels/signaling/messages/PlayerLeft' }
      - { $ref: '#/channels/signaling/messages/ServerGameData' }
      - { $ref: '#/channels/signaling/messages/GameDataBinary' }
      - { $ref: '#/channels/signaling/messages/AuthorityChanged' }
      - { $ref: '#/channels/signaling/messages/AuthorityResponse' }
      - { $ref: '#/channels/signaling/messages/LobbyStateChanged' }
      - { $ref: '#/channels/signaling/messages/GameStarting' }
      - { $ref: '#/channels/signaling/messages/ServerSignal' }
      - { $ref: '#/channels/signaling/messages/NewPeer' }
      - { $ref: '#/channels/signaling/messages/SessionPlan' }
      - { $ref: '#/channels/signaling/messages/Pong' }
      - { $ref: '#/channels/signaling/messages/Reconnected' }
      - { $ref: '#/channels/signaling/messages/ReconnectionFailed' }
      - { $ref: '#/channels/signaling/messages/PlayerReconnected' }
      - { $ref: '#/channels/signaling/messages/SpectatorJoined' }
      - { $ref: '#/channels/signaling/messages/SpectatorJoinFailed' }
      - { $ref: '#/channels/signaling/messages/SpectatorLeft' }
      - { $ref: '#/channels/signaling/messages/NewSpectatorJoined' }
      - { $ref: '#/channels/signaling/messages/SpectatorDisconnected' }
      - { $ref: '#/channels/signaling/messages/Error' }
      - { $ref: '#/channels/signaling/messages/PeerTransportStatus' }
      - { $ref: '#/channels/signaling/messages/RelayStats' }
      - { $ref: '#/channels/signaling/messages/GoingAway' }
      - { $ref: '#/channels/signaling/messages/DeliveryReport' }

components:
  messages:
    # =====================================================================
    # CLIENT -> SERVER (ClientMessage)
    # =====================================================================
    Authenticate:
      title: Authenticate
      summary: MUST be the first message. App ID is a public identifier, not a secret.
      payload: { $ref: '#/components/schemas/Authenticate' }
    JoinRoom:
      title: JoinRoom
      summary: Join an existing room (room_code) or create one (room_code omitted).
      payload: { $ref: '#/components/schemas/JoinRoom' }
    LeaveRoom:
      title: LeaveRoom
      summary: Leave the current room. No data payload.
      payload: { $ref: '#/components/schemas/LeaveRoom' }
    ClientGameData:
      title: GameData
      summary: Send opaque game data to other players in the room (relay floor).
      payload: { $ref: '#/components/schemas/ClientGameData' }
    ClientSignal:
      title: Signal
      summary: 'v3: relay an opaque WebRTC signal to a specific peer. Forwarded verbatim.'
      payload: { $ref: '#/components/schemas/ClientSignal' }
    AuthorityRequest:
      title: AuthorityRequest
      summary: Request to become / connect to the authoritative peer.
      payload: { $ref: '#/components/schemas/AuthorityRequest' }
    PlayerReady:
      title: PlayerReady
      summary: Toggle this player's lobby readiness. No data payload.
      payload: { $ref: '#/components/schemas/PlayerReady' }
    StartGame:
      title: StartGame
      summary: >-
        Explicitly finalize the lobby and start. Accepted only when all_ready; if
        the room has an authority only that authority may start, else any player
        may. No data payload.
      payload: { $ref: '#/components/schemas/StartGame' }
    ProvideConnectionInfo:
      title: ProvideConnectionInfo
      summary: Legacy self-declared v2 connection metadata for GameStarting.
      payload: { $ref: '#/components/schemas/ProvideConnectionInfo' }
    Ping:
      title: Ping
      summary: Heartbeat. No data payload.
      payload: { $ref: '#/components/schemas/Ping' }
    Reconnect:
      title: Reconnect
      summary: Reconnect to a room after disconnection using the join auth_token.
      payload: { $ref: '#/components/schemas/Reconnect' }
    JoinAsSpectator:
      title: JoinAsSpectator
      summary: Join a room as a read-only observer.
      payload: { $ref: '#/components/schemas/JoinAsSpectator' }
    LeaveSpectator:
      title: LeaveSpectator
      summary: Leave spectator mode. No data payload.
      payload: { $ref: '#/components/schemas/LeaveSpectator' }
    TransportStatus:
      title: TransportStatus
      summary: 'v3: report this client''s data-path transport state (informational).'
      payload: { $ref: '#/components/schemas/TransportStatus' }

    # =====================================================================
    # SERVER -> CLIENT (ServerMessage)
    # =====================================================================
    Authenticated:
      title: Authenticated
      payload: { $ref: '#/components/schemas/Authenticated' }
    ProtocolInfo:
      title: ProtocolInfo
      summary: SDK/protocol compatibility + negotiated version range.
      payload: { $ref: '#/components/schemas/ProtocolInfo' }
    AuthenticationError:
      title: AuthenticationError
      payload: { $ref: '#/components/schemas/AuthenticationError' }
    RoomJoined:
      title: RoomJoined
      payload: { $ref: '#/components/schemas/RoomJoined' }
    RoomJoinFailed:
      title: RoomJoinFailed
      payload: { $ref: '#/components/schemas/RoomJoinFailed' }
    RoomLeft:
      title: RoomLeft
      summary: Successfully left the room. No data payload.
      payload: { $ref: '#/components/schemas/RoomLeft' }
    PlayerJoined:
      title: PlayerJoined
      payload: { $ref: '#/components/schemas/PlayerJoined' }
    PlayerLeft:
      title: PlayerLeft
      payload: { $ref: '#/components/schemas/PlayerLeft' }
    ServerGameData:
      title: GameData
      summary: Game data forwarded from another player.
      payload: { $ref: '#/components/schemas/ServerGameData' }
    GameDataBinary:
      title: GameDataBinary
      contentType: application/msgpack
      summary: >-
        Physical binary WebSocket delivery: the frozen protocol-v2 MessagePack
        map or the protocol-v3 MessagePack accountability envelope.
      x-rust-server-variant: GameDataBinary
      x-websocket-binary-envelope: messagepack
      payload:
        oneOf:
          - { $ref: '#/components/schemas/V2BinaryGameDataEnvelope' }
          - { $ref: '#/components/schemas/V3BinaryGameDataEnvelope' }
    AuthorityChanged:
      title: AuthorityChanged
      payload: { $ref: '#/components/schemas/AuthorityChanged' }
    AuthorityResponse:
      title: AuthorityResponse
      payload: { $ref: '#/components/schemas/AuthorityResponse' }
    LobbyStateChanged:
      title: LobbyStateChanged
      payload: { $ref: '#/components/schemas/LobbyStateChanged' }
    GameStarting:
      title: GameStarting
      summary: >-
        Game is starting with legacy peer metadata. v3 topology/transport/ICE
        directives are carried by SessionPlan, not here.
      payload: { $ref: '#/components/schemas/GameStarting' }
    ServerSignal:
      title: Signal
      summary: 'v3: relayed opaque WebRTC signal from another peer. Verbatim.'
      payload: { $ref: '#/components/schemas/ServerSignal' }
    NewPeer:
      title: NewPeer
      summary: >-
        v3 compatibility shape for an additive WebRTC peer directive.
        Current finalized membership changes use complete SessionPlan refreshes.
      payload: { $ref: '#/components/schemas/NewPeer' }
    SessionPlan:
      title: SessionPlan
      summary: >-
        v3: per-recipient authoritative session directive at lobby finalization
        and finalized membership refreshes. Latest SessionPlan wins. The relay
        floor is an explicit relay/relay plan with no peers.
      payload: { $ref: '#/components/schemas/SessionPlan' }
    Pong:
      title: Pong
      summary: Pong response to Ping. No data payload.
      payload: { $ref: '#/components/schemas/Pong' }
    Reconnected:
      title: Reconnected
      payload: { $ref: '#/components/schemas/Reconnected' }
    ReconnectionFailed:
      title: ReconnectionFailed
      payload: { $ref: '#/components/schemas/ReconnectionFailed' }
    PlayerReconnected:
      title: PlayerReconnected
      payload: { $ref: '#/components/schemas/PlayerReconnected' }
    SpectatorJoined:
      title: SpectatorJoined
      payload: { $ref: '#/components/schemas/SpectatorJoined' }
    SpectatorJoinFailed:
      title: SpectatorJoinFailed
      payload: { $ref: '#/components/schemas/SpectatorJoinFailed' }
    SpectatorLeft:
      title: SpectatorLeft
      payload: { $ref: '#/components/schemas/SpectatorLeft' }
    NewSpectatorJoined:
      title: NewSpectatorJoined
      payload: { $ref: '#/components/schemas/NewSpectatorJoined' }
    SpectatorDisconnected:
      title: SpectatorDisconnected
      payload: { $ref: '#/components/schemas/SpectatorDisconnected' }
    Error:
      title: Error
      payload: { $ref: '#/components/schemas/Error' }
    PeerTransportStatus:
      title: PeerTransportStatus
      summary: 'v3: a same-room peer''s reported data-path transport state changed.'
      payload: { $ref: '#/components/schemas/PeerTransportStatus' }
    RelayStats:
      title: RelayStats
      summary: >-
        v3: periodic per-connection relay-delivery statistics (opt-in via
        websocket.delivery_stats_interval_secs; never sent to pre-v3 clients).
      payload: { $ref: '#/components/schemas/RelayStats' }
    GoingAway:
      title: GoingAway
      summary: 'v3: graceful shutdown-drain advisory before close code 4000.'
      payload: { $ref: '#/components/schemas/GoingAway' }
    DeliveryReport:
      title: DeliveryReport
      summary: 'v3: cumulative per-class outcomes plus exact newly-accounted gap ranges.'
      payload: { $ref: '#/components/schemas/DeliveryReport' }

  schemas:
    # ---------------------------------------------------------------------
    # Shared token enums (Appendix A wire tokens)
    # ---------------------------------------------------------------------
    Transport:
      type: string
      description: Data-path transport. relay is the universal floor.
      enum: [relay, direct, webrtc]
    Topology:
      type: string
      description: Session topology negotiated for a room.
      enum: [relay, host, mesh]
    RelayTransport:
      type: string
      description: Preferred relay transport protocol for GameData fan-out.
      enum: [tcp, udp, websocket, auto]
    GameDataEncoding:
      type: string
      description: Game data encoding. rkyv is reserved/internal and not advertised.
      enum: [json, message_pack, rkyv]
    DeliveryClass:
      type: string
      description: >-
        Protocol-v3 game-data delivery policy. Omission means reliable.
        latest requires a sender-defined key; reliable and volatile forbid one.
      enum: [reliable, latest, volatile]
    DeliveryGapReason:
      type: string
      description: Why an exact server-stamped sequence range was not delivered.
      enum: [latest_superseded, latest_dropped_full, volatile_dropped, unsupported_format]
    LobbyState:
      type: string
      enum: [waiting, lobby, finalized]
    SpectatorStateChangeReason:
      type: string
      enum: [joined, voluntary_leave, disconnected, removed, room_closed]
    ReplayStatus:
      type: string
      description: >-
        Completeness of Reconnected.missed_events (v3+ recipients only; the
        field is absent on the v2 wire). complete: every replayable control
        event since disconnect is present. truncated: the bounded replay ring
        evicted events the player needed, so missed_events is a suffix —
        resync from the Reconnected snapshot fields. unavailable: event replay
        is not active on this deployment (event_buffer_size 0) — treat the
        reconnection as a full resync from the snapshot.
      enum: [complete, truncated, unavailable]
    PlayerId:
      type: string
      format: uuid
      description: Player UUID.
    BinaryPlayerId:
      type: string
      contentEncoding: binary
      minLength: 16
      maxLength: 16
      x-messagepack-type: bin
      description: >-
        A UUID encoded as exactly 16 MessagePack bin bytes in RFC 4122/network
        byte order (the canonical UUID octet sequence, not a UTF-8 UUID string).
    RoomId:
      type: string
      format: uuid
      description: Room UUID.
    ErrorCode:
      type: string
      description: >-
        Structured error code (SCREAMING_SNAKE_CASE). Mirrors the ErrorCode enum
        in src/protocol/error_codes.rs; guarded by tests/protocol_spec_consistency.rs.
      enum:
        - UNAUTHORIZED
        - INVALID_TOKEN
        - AUTHENTICATION_REQUIRED
        - INVALID_APP_ID
        - APP_ID_EXPIRED
        - APP_ID_REVOKED
        - APP_ID_SUSPENDED
        - MISSING_APP_ID
        - AUTHENTICATION_TIMEOUT
        - SDK_VERSION_UNSUPPORTED
        - UNSUPPORTED_GAME_DATA_FORMAT
        - INVALID_INPUT
        - INVALID_GAME_NAME
        - INVALID_ROOM_CODE
        - INVALID_PLAYER_NAME
        - INVALID_MAX_PLAYERS
        - MESSAGE_TOO_LARGE
        - ROOM_NOT_FOUND
        - ROOM_FULL
        - ALREADY_IN_ROOM
        - NOT_IN_ROOM
        - ROOM_CREATION_FAILED
        - MAX_ROOMS_PER_GAME_EXCEEDED
        - INVALID_ROOM_STATE
        - AUTHORITY_NOT_SUPPORTED
        - AUTHORITY_CONFLICT
        - AUTHORITY_DENIED
        - RATE_LIMIT_EXCEEDED
        - TOO_MANY_CONNECTIONS
        - RECONNECTION_FAILED
        - RECONNECTION_TOKEN_INVALID
        - RECONNECTION_EXPIRED
        - PLAYER_ALREADY_CONNECTED
        - SPECTATOR_NOT_ALLOWED
        - TOO_MANY_SPECTATORS
        - NOT_A_SPECTATOR
        - SPECTATOR_JOIN_FAILED
        - INTERNAL_ERROR
        - STORAGE_ERROR
        - SERVICE_UNAVAILABLE
        - CROSS_ROOM_SIGNAL
        - UNSUPPORTED_TRANSPORT
        - SIGNAL_TARGET_NOT_FOUND
        - SIGNAL_RATE_LIMITED
        - SIGNAL_TOO_LARGE
        - CONNECTION_IDLE_TIMEOUT
        - GAME_START_NOT_READY
        - GAME_START_FORBIDDEN
        - SLOW_CONSUMER
        - ACTIVITY_TIMEOUT
        - SERVER_DRAINING
        - INVALID_DELIVERY_CLASS

    ReliableDeliveryCounters:
      type: object
      required: [delivered, abandoned, unsupported_format]
      properties:
        delivered: { type: integer, minimum: 0 }
        abandoned:
          type: integer
          minimum: 0
          description: Messages abandoned together with a loud connection close.
        unsupported_format: { type: integer, minimum: 0 }
    LatestDeliveryCounters:
      type: object
      required: [delivered, superseded, dropped_full, abandoned, unsupported_format]
      properties:
        delivered: { type: integer, minimum: 0 }
        superseded: { type: integer, minimum: 0 }
        dropped_full: { type: integer, minimum: 0 }
        abandoned:
          type: integer
          minimum: 0
          description: Messages abandoned together with a loud connection close.
        unsupported_format: { type: integer, minimum: 0 }
    VolatileDeliveryCounters:
      type: object
      required: [delivered, dropped, abandoned, unsupported_format]
      properties:
        delivered: { type: integer, minimum: 0 }
        dropped: { type: integer, minimum: 0 }
        abandoned:
          type: integer
          minimum: 0
          description: Messages abandoned together with a loud connection close.
        unsupported_format: { type: integer, minimum: 0 }
    DeliveryCountersByClass:
      type: object
      required: [reliable, latest, volatile]
      properties:
        reliable: { $ref: '#/components/schemas/ReliableDeliveryCounters' }
        latest: { $ref: '#/components/schemas/LatestDeliveryCounters' }
        volatile: { $ref: '#/components/schemas/VolatileDeliveryCounters' }
    DeliveryGap:
      type: object
      description: >-
        Exact inclusive server-stamped sequence range omitted for one recipient.
        from_seq must not exceed to_seq.
      required: [from_player, epoch, from_seq, to_seq, reason]
      properties:
        from_player: { $ref: '#/components/schemas/PlayerId' }
        epoch: { type: integer, minimum: 1, maximum: 4294967295 }
        from_seq: { type: integer, minimum: 1 }
        to_seq: { type: integer, minimum: 1 }
        reason: { $ref: '#/components/schemas/DeliveryGapReason' }

    # ---------------------------------------------------------------------
    # Shared object schemas
    # ---------------------------------------------------------------------
    RateLimitInfo:
      type: object
      required: [per_minute, per_hour, per_day]
      properties:
        per_minute: { type: integer }
        per_hour: { type: integer }
        per_day: { type: integer }
    IceServer:
      type: object
      description: Mirrors RTCIceServer. STUN needs no credentials.
      required: [urls]
      properties:
        urls:
          type: array
          items: { type: string }
        username: { type: string }
        credential: { type: string }
    PlayerInfo:
      oneOf:
        - { $ref: '#/components/schemas/V2PlayerInfo' }
        - { $ref: '#/components/schemas/V3PlayerInfo' }
      description: >-
        Version-disjoint room member snapshot. Protocol v2 omits relay
        accountability fields; protocol v3 requires the paired epoch/seq
        recipient baseline.
    V2PlayerInfo:
      type: object
      required: [id, name, is_authority, is_ready, connected_at]
      additionalProperties: false
      properties:
        id: { $ref: '#/components/schemas/PlayerId' }
        name: { type: string }
        is_authority: { type: boolean }
        is_ready: { type: boolean }
        connected_at: { type: string, format: date-time }
        connection_info: { $ref: '#/components/schemas/ConnectionInfo' }
    V3PlayerInfo:
      type: object
      required: [id, name, is_authority, is_ready, connected_at, epoch, seq]
      additionalProperties: false
      properties:
        id: { $ref: '#/components/schemas/PlayerId' }
        name: { type: string }
        is_authority: { type: boolean }
        is_ready: { type: boolean }
        connected_at: { type: string, format: date-time }
        connection_info: { $ref: '#/components/schemas/ConnectionInfo' }
        epoch:
          type: integer
          minimum: 1
          maximum: 4294967295
          description: >-
            v3 only: this player's current incarnation epoch (see
            ServerGameData.epoch), carried on room snapshots (RoomJoined,
            SpectatorJoined, PlayerJoined, Reconnected) so a v3 recipient learns
            each member's epoch before that member's first relayed frame.
        seq:
          type: integer
          minimum: 0
          description: >-
            v3 only: exact recipient-visible relay baseline paired with epoch.
            This is the last sequence already outside this snapshot recipient's
            delivery obligation (0 means none). Subsequent delivery or exact
            gap coverage therefore starts at seq + 1. Absent together with
            epoch for pre-v3 recipients (byte-identical wire).
    SenderWatermark:
      type: object
      required: [player_id, epoch, seq]
      description: >-
        v3 only: authoritative reconnect baseline for one current room
        member's relayed GameData stream. `seq` is the last server-stamped
        relay sequence in that member's current incarnation (0 means none yet);
        `epoch` is the member's current incarnation epoch. Reconnecting clients
        use these watermarks to re-baseline after missed GameData is deliberately
        not replayed.
      properties:
        player_id: { $ref: '#/components/schemas/PlayerId' }
        epoch:
          type: integer
          minimum: 1
          maximum: 4294967295
        seq:
          type: integer
          minimum: 0
    SpectatorInfo:
      type: object
      required: [id, name, connected_at]
      properties:
        id: { $ref: '#/components/schemas/PlayerId' }
        name: { type: string }
        connected_at: { type: string, format: date-time }
    SessionPeer:
      type: object
      required: [player_id, player_name, is_authority, initiate]
      properties:
        player_id: { $ref: '#/components/schemas/PlayerId' }
        player_name: { type: string }
        is_authority: { type: boolean }
        initiate:
          type: boolean
          description: >-
            True if the recipient sends the WebRTC offer to this peer. Server
            decides this (glare resolution); clients MUST NOT recompute it.
    PeerConnectionInfo:
      type: object
      required: [player_id, player_name, is_authority, relay_type]
      properties:
        player_id: { $ref: '#/components/schemas/PlayerId' }
        player_name: { type: string }
        is_authority: { type: boolean }
        relay_type: { type: string }
        connection_info: { $ref: '#/components/schemas/ConnectionInfo' }
    ConnectionInfo:
      type: object
      description: >-
        Legacy self-declared peer metadata (tagged by an inner `type` field:
        direct | unity_relay | relay | webrtc | custom). Not v3 negotiation.
      required: [type]
      properties:
        type:
          type: string
          enum: [direct, unity_relay, relay, webrtc, custom]
      additionalProperties: true
    PlayerNameRulesPayload:
      type: object
      required:
        - max_length
        - min_length
        - allow_unicode_alphanumeric
        - allow_spaces
        - allow_leading_trailing_whitespace
      properties:
        max_length: { type: integer }
        min_length: { type: integer }
        allow_unicode_alphanumeric: { type: boolean }
        allow_spaces: { type: boolean }
        allow_leading_trailing_whitespace: { type: boolean }
        allowed_symbols:
          type: array
          items: { type: string }
        additional_allowed_characters: { type: string }

    # ---------------------------------------------------------------------
    # ClientMessage payloads
    # ---------------------------------------------------------------------
    Authenticate:
      type: object
      properties:
        type: { const: Authenticate }
        data:
          type: object
          required: [app_id]
          properties:
            app_id:
              type: string
              description: Public App ID (safe to embed in builds).
            sdk_version: { type: string }
            platform: { type: string }
            game_data_format: { $ref: '#/components/schemas/GameDataEncoding' }
            protocol_version:
              type: integer
              description: 'v3: highest protocol version the client speaks.'
            supported_transports:
              type: array
              description: 'v3: data-path transports the client supports (absent => relay-only).'
              items: { $ref: '#/components/schemas/Transport' }
            supported_topologies:
              type: array
              description: 'v3: session topologies the client supports (absent => relay-only).'
              items: { $ref: '#/components/schemas/Topology' }
      required: [type, data]
    JoinRoom:
      type: object
      properties:
        type: { const: JoinRoom }
        data:
          type: object
          required: [game_name, player_name]
          properties:
            game_name: { type: string }
            room_code:
              type: string
              description: Omit to create a new room; provide to join/create by code.
            player_name: { type: string }
            max_players: { type: integer, description: Ceiling, not a required count. }
            supports_authority: { type: boolean }
            relay_transport: { $ref: '#/components/schemas/RelayTransport' }
      required: [type, data]
    LeaveRoom:
      type: object
      description: No data payload.
      properties:
        type: { const: LeaveRoom }
      required: [type]
    ClientGameData:
      type: object
      description: >-
        Client-to-server game data. class and key are protocol-v3-only; pre-v3
        clients omit both. Omitted class means reliable. A well-typed illegal
        class/key pairing returns INVALID_DELIVERY_CLASS; unknown tokens, wrong
        types, out-of-range keys, and explicit null are malformed INVALID_INPUT.
      properties:
        type: { const: GameData }
        data:
          type: object
          required: [data]
          properties:
            data:
              description: Opaque application game data (any JSON value).
            class: { $ref: '#/components/schemas/DeliveryClass' }
            key:
              type: integer
              minimum: 0
              maximum: 4294967295
              description: Sender-defined coalescing key, present exactly for class latest.
          allOf:
            - if:
                required: [class]
                properties:
                  class: { const: latest }
              then:
                required: [key]
              else:
                not: { required: [key] }
      required: [type, data]
    ClientSignal:
      type: object
      description: 'v3 only.'
      properties:
        type: { const: Signal }
        data:
          type: object
          required: [to, signal]
          properties:
            to: { $ref: '#/components/schemas/PlayerId' }
            signal:
              description: >-
                Opaque, forwarded verbatim. By convention matchbox-compatible:
                {"Offer":..} | {"Answer":..} | {"IceCandidate":..}.
      required: [type, data]
    AuthorityRequest:
      type: object
      properties:
        type: { const: AuthorityRequest }
        data:
          type: object
          required: [become_authority]
          properties:
            become_authority: { type: boolean }
      required: [type, data]
    PlayerReady:
      type: object
      description: No data payload. Toggles readiness.
      properties:
        type: { const: PlayerReady }
      required: [type]
    StartGame:
      type: object
      description: >-
        No data payload. Accepted only when all_ready. Authorization: if the room
        has a designated authority only that authority may start; otherwise any
        player may. Rejected with GAME_START_NOT_READY / GAME_START_FORBIDDEN.
      properties:
        type: { const: StartGame }
      required: [type]
    ProvideConnectionInfo:
      type: object
      properties:
        type: { const: ProvideConnectionInfo }
        data:
          type: object
          required: [connection_info]
          properties:
            connection_info: { $ref: '#/components/schemas/ConnectionInfo' }
      required: [type, data]
    Ping:
      type: object
      description: No data payload.
      properties:
        type: { const: Ping }
      required: [type]
    Reconnect:
      type: object
      properties:
        type: { const: Reconnect }
        data:
          type: object
          required: [player_id, room_id, auth_token]
          properties:
            player_id: { $ref: '#/components/schemas/PlayerId' }
            room_id: { $ref: '#/components/schemas/RoomId' }
            auth_token: { type: string, description: Token issued at initial join. }
      required: [type, data]
    JoinAsSpectator:
      type: object
      properties:
        type: { const: JoinAsSpectator }
        data:
          type: object
          required: [game_name, room_code, spectator_name]
          properties:
            game_name: { type: string }
            room_code: { type: string }
            spectator_name: { type: string }
      required: [type, data]
    LeaveSpectator:
      type: object
      description: No data payload.
      properties:
        type: { const: LeaveSpectator }
      required: [type]
    TransportStatus:
      type: object
      description: >-
        v3 only. Purely informational: P2P status never disables the relay
        floor. Delivery failures can still close the physical socket loudly.
      properties:
        type: { const: TransportStatus }
        data:
          type: object
          required: [transport, connected]
          properties:
            transport: { $ref: '#/components/schemas/Transport' }
            connected: { type: boolean }
      required: [type, data]

    # ---------------------------------------------------------------------
    # ServerMessage payloads
    # ---------------------------------------------------------------------
    Authenticated:
      type: object
      properties:
        type: { const: Authenticated }
        data:
          type: object
          required: [app_name, rate_limits]
          properties:
            app_name: { type: string }
            organization: { type: string }
            rate_limits: { $ref: '#/components/schemas/RateLimitInfo' }
      required: [type, data]
    ProtocolInfo:
      type: object
      description: >-
        Payload is a flattened ProtocolInfoPayload (newtype variant). v3 fields
        protocol_version / min_protocol_version / max_protocol_version /
        transports are absent on negotiated v2 connections.
      properties:
        type: { const: ProtocolInfo }
        data:
          type: object
          properties:
            platform: { type: string }
            sdk_version: { type: string }
            minimum_version: { type: string }
            recommended_version: { type: string }
            capabilities:
              type: array
              items: { type: string }
            notes: { type: string }
            game_data_formats:
              type: array
              items: { $ref: '#/components/schemas/GameDataEncoding' }
            player_name_rules: { $ref: '#/components/schemas/PlayerNameRulesPayload' }
            protocol_version: { type: integer, minimum: 2, maximum: 3 }
            min_protocol_version: { type: integer, minimum: 2, maximum: 3 }
            max_protocol_version: { type: integer, minimum: 2, maximum: 3 }
            transports:
              type: array
              description: Server message transports available to this connection.
              items:
                type: string
                enum: [websocket]
      required: [type, data]
    AuthenticationError:
      type: object
      properties:
        type: { const: AuthenticationError }
        data:
          type: object
          required: [error, error_code]
          properties:
            error: { type: string }
            error_code: { $ref: '#/components/schemas/ErrorCode' }
      required: [type, data]
    RoomJoined:
      type: object
      description: Payload is a flattened RoomJoinedPayload (boxed newtype variant).
      properties:
        type: { const: RoomJoined }
        data:
          type: object
          required:
            - room_id
            - room_code
            - player_id
            - game_name
            - max_players
            - supports_authority
            - current_players
            - is_authority
            - lobby_state
            - ready_players
            - relay_type
          properties:
            room_id: { $ref: '#/components/schemas/RoomId' }
            room_code: { type: string }
            player_id: { $ref: '#/components/schemas/PlayerId' }
            game_name: { type: string }
            max_players: { type: integer }
            supports_authority: { type: boolean }
            current_players:
              type: array
              items: { $ref: '#/components/schemas/PlayerInfo' }
            is_authority: { type: boolean }
            lobby_state: { $ref: '#/components/schemas/LobbyState' }
            ready_players:
              type: array
              items: { $ref: '#/components/schemas/PlayerId' }
            relay_type: { type: string }
            current_spectators:
              type: array
              items: { $ref: '#/components/schemas/SpectatorInfo' }
            ice_servers:
              type: array
              description: 'v3 pre-gather only; superseded by SessionPlan.ice_servers.'
              items: { $ref: '#/components/schemas/IceServer' }
            reconnection_token:
              type: string
              description: >-
                Reconnection token for this room, minted at join (v3+
                recipients only; absent on the v2 wire). Present it in a later
                Reconnect after an unexpected disconnect. The string is stable
                from join through the disconnect, but it only becomes
                claimable for server.reconnection_window seconds counted from
                the DISCONNECT. Rotated on every join and every successful
                reconnect.
      required: [type, data]
    RoomJoinFailed:
      type: object
      properties:
        type: { const: RoomJoinFailed }
        data:
          type: object
          required: [reason]
          properties:
            reason: { type: string }
            error_code: { $ref: '#/components/schemas/ErrorCode' }
      required: [type, data]
    RoomLeft:
      type: object
      description: No data payload.
      properties:
        type: { const: RoomLeft }
      required: [type]
    PlayerJoined:
      type: object
      properties:
        type: { const: PlayerJoined }
        data:
          type: object
          required: [player]
          properties:
            player: { $ref: '#/components/schemas/PlayerInfo' }
      required: [type, data]
    PlayerLeft:
      type: object
      description: >-
        v3 adds a terminal sender watermark so the recipient can retain any
        priority-overtaken data tail until delivered frames plus exact prior
        gaps cover final_seq, then retire that sender's accounting state. The
        frozen v2 form contains player_id only.
      properties:
        type: { const: PlayerLeft }
        data:
          type: object
          properties:
            player_id: { $ref: '#/components/schemas/PlayerId' }
            epoch:
              type: integer
              minimum: 1
              maximum: 4294967295
            final_seq:
              type: integer
              minimum: 0
          oneOf:
            - required: [player_id]
              not:
                anyOf:
                  - required: [epoch]
                  - required: [final_seq]
            - required: [player_id, epoch, final_seq]
      required: [type, data]
    ServerGameData:
      type: object
      description: >-
        DELIVERY CONTRACT: pre-v3 traffic and v3 reliable traffic preserve every
        message or disconnect the recipient loudly. Protocol-v3 latest and
        volatile traffic may omit data only under their documented queue policy;
        every omission is counted and named by an exact, causally-prioritized
        DeliveryReport gap range before later data exposes the discontinuity.
        class omission means reliable. A recipient closed with SLOW_CONSUMER must
        resynchronize after reconnecting.
      properties:
        type: { const: GameData }
        data:
          type: object
          required: [from_player, data]
          properties:
            from_player: { $ref: '#/components/schemas/PlayerId' }
            data:
              description: Opaque application game data (any JSON value).
            seq:
              type: integer
              minimum: 1
              description: >-
                v3 only: server-stamped relay sequence number, per (sender,
                room). Starts at 1 and advances once for every accepted send.
                Within an epoch, surviving frames are strictly increasing; a
                discontinuity is legal only when every missing sequence is
                covered by the union of earlier exact DeliveryReport gaps, the
                recipient disconnected loudly, or the receiver re-baselined
                from Reconnected.sender_watermarks. Priority lifecycle control
                may overtake queued old-epoch data: validate that tail but do not
                apply it after the lifecycle change. A future epoch must be
                announced; after data advances, older epochs are invalid. A new
                sender incarnation bumps epoch and restarts seq at 1.
                Absent for pre-v3 recipients (their bytes are byte-identical).
                Client-to-server GameData carries no seq or epoch; stamping is
                purely server-side.
            epoch:
              type: integer
              minimum: 1
              maximum: 4294967295
              description: >-
                v3 only: server-tracked incarnation epoch. A single monotonic
                per-connection counter that increments once per incarnation (the
                first join is 1; each join-after-leave or reconnect increments
                it; NOT reset when the same connection switches rooms), while seq
                restarts at 1 within each epoch. Data-lane stamps increase
                lexicographically per (sender, room), but priority lifecycle
                control may be observed before a queued old-epoch tail. The
                absolute value is not meaningful: baseline each sender from the
                epoch first observed in a snapshot, require lifecycle announcement
                of future epochs, and compare relatively. Stamped together with
                seq; absent for pre-v3 recipients (byte-identical wire). Also
                carried on room snapshots (see PlayerInfo.epoch,
                PlayerReconnected.epoch).
            class:
              allOf: [{ $ref: '#/components/schemas/DeliveryClass' }]
              description: >-
                v3 only: the sender-requested delivery class, echoed when the
                client supplied it. Absence means reliable.
            key:
              type: integer
              minimum: 0
              maximum: 4294967295
              description: 'v3 only: sender-defined coalescing key for class latest.'
          allOf:
            - if:
                required: [class]
                properties:
                  class: { const: latest }
              then:
                required: [key]
              else:
                not: { required: [key] }
      required: [type, data]
    V2BinaryGameDataEnvelope:
      type: object
      additionalProperties: false
      x-protocol-version: 2
      description: >-
        The frozen three-field MessagePack map sent to protocol-v2 recipients
        that negotiated message_pack. Legacy JSON and rkyv binary paths are raw
        payload passthrough and do not use this map.
      required: [from_player, encoding, payload]
      properties:
        from_player: { $ref: '#/components/schemas/BinaryPlayerId' }
        encoding: { const: message_pack }
        payload:
          type: string
          contentEncoding: binary
          x-messagepack-type: bin
          description: Opaque application payload bytes.
    V3BinaryGameDataEnvelope:
      type: object
      additionalProperties: false
      x-protocol-version: 3
      description: >-
        The physical MessagePack map on every protocol-v3 binary WebSocket
        delivery. Payload bytes remain opaque; encoding identifies only those
        bytes, while seq and epoch account the shared relay stream.
      required: [from_player, encoding, payload, seq, epoch]
      properties:
        from_player: { $ref: '#/components/schemas/BinaryPlayerId' }
        encoding: { $ref: '#/components/schemas/GameDataEncoding' }
        payload:
          type: string
          contentEncoding: binary
          x-messagepack-type: bin
          description: Opaque application payload bytes.
        seq:
          type: integer
          minimum: 1
        epoch:
          type: integer
          minimum: 1
          maximum: 4294967295
    AuthorityChanged:
      type: object
      properties:
        type: { const: AuthorityChanged }
        data:
          type: object
          required: [you_are_authority]
          properties:
            authority_player: { $ref: '#/components/schemas/PlayerId' }
            you_are_authority: { type: boolean }
      required: [type, data]
    AuthorityResponse:
      type: object
      properties:
        type: { const: AuthorityResponse }
        data:
          type: object
          required: [granted]
          properties:
            granted: { type: boolean }
            reason: { type: string }
            error_code: { $ref: '#/components/schemas/ErrorCode' }
      required: [type, data]
    LobbyStateChanged:
      type: object
      properties:
        type: { const: LobbyStateChanged }
        data:
          type: object
          required: [lobby_state, ready_players, all_ready]
          properties:
            lobby_state: { $ref: '#/components/schemas/LobbyState' }
            ready_players:
              type: array
              items: { $ref: '#/components/schemas/PlayerId' }
            all_ready: { type: boolean }
      required: [type, data]
    GameStarting:
      type: object
      properties:
        type: { const: GameStarting }
        data:
          type: object
          required: [peer_connections]
          properties:
            peer_connections:
              type: array
              items: { $ref: '#/components/schemas/PeerConnectionInfo' }
      required: [type, data]
    ServerSignal:
      type: object
      description: 'v3 only.'
      properties:
        type: { const: Signal }
        data:
          type: object
          required: [from, signal]
          properties:
            from: { $ref: '#/components/schemas/PlayerId' }
            signal:
              description: Opaque WebRTC signal forwarded verbatim from a peer.
      required: [type, data]
    NewPeer:
      type: object
      description: >-
        v3 compatibility shape. Current server membership refreshes use complete
        SessionPlan messages instead of emitting NewPeer deltas.
      properties:
        type: { const: NewPeer }
        data:
          type: object
          required: [peer_id, you_initiate]
          properties:
            peer_id: { $ref: '#/components/schemas/PlayerId' }
            you_initiate:
              type: boolean
              description: >-
                Server-decided offerer flag (glare resolution). Clients MUST NOT
                recompute it. On NewPeer, additively connect to the new peer.
      required: [type, data]
    SessionPlan:
      type: object
      description: >-
        v3 only. Per-recipient. Payload is a flattened SessionPlanPayload (boxed
        newtype variant). Latest SessionPlan wins. Every v3 member receives one
        after GameStarting, including an explicit relay/relay reset when no
        upgrade rung fits; protocol-v2 members receive none.
      properties:
        type: { const: SessionPlan }
        data:
          type: object
          required: [topology, transport, peers, fallback]
          properties:
            topology: { $ref: '#/components/schemas/Topology' }
            transport: { $ref: '#/components/schemas/Transport' }
            host:
              allOf: [{ $ref: '#/components/schemas/PlayerId' }]
              description: Present only for host topology.
            peers:
              type: array
              items: { $ref: '#/components/schemas/SessionPeer' }
            ice_servers:
              type: array
              items: { $ref: '#/components/schemas/IceServer' }
            fallback:
              const: relay
              description: Universal fallback transport; always relay (the floor).
          allOf:
            - if:
                required: [topology]
                properties:
                  topology: { const: relay }
              then:
                properties:
                  transport: { const: relay }
                  peers: { maxItems: 0 }
                  ice_servers: { maxItems: 0 }
                not: { required: [host] }
      required: [type, data]
    Pong:
      type: object
      description: No data payload.
      properties:
        type: { const: Pong }
      required: [type]
    Reconnected:
      type: object
      description: Payload is a flattened ReconnectedPayload (boxed newtype variant).
      properties:
        type: { const: Reconnected }
        data:
          type: object
          required:
            - room_id
            - room_code
            - player_id
            - game_name
            - max_players
            - supports_authority
            - current_players
            - is_authority
            - lobby_state
            - ready_players
            - relay_type
            - missed_events
          properties:
            room_id: { $ref: '#/components/schemas/RoomId' }
            room_code: { type: string }
            player_id: { $ref: '#/components/schemas/PlayerId' }
            game_name: { type: string }
            max_players: { type: integer }
            supports_authority: { type: boolean }
            current_players:
              type: array
              items: { $ref: '#/components/schemas/PlayerInfo' }
            is_authority: { type: boolean }
            lobby_state: { $ref: '#/components/schemas/LobbyState' }
            ready_players:
              type: array
              items: { $ref: '#/components/schemas/PlayerId' }
            relay_type: { type: string }
            current_spectators:
              type: array
              items: { $ref: '#/components/schemas/SpectatorInfo' }
            ice_servers:
              type: array
              items: { $ref: '#/components/schemas/IceServer' }
            missed_events:
              type: array
              description: >-
                Room-uniform control events broadcast while disconnected
                (ServerMessage values: PlayerJoined, PlayerLeft,
                PlayerReconnected, NewSpectatorJoined, SpectatorDisconnected,
                LobbyStateChanged, AuthorityChanged), oldest first. GameData,
                Signal, and the per-recipient GameStarting are never replayed —
                resync from this payload's snapshot fields and, for started
                sessions, the late-join SessionPlan.
              items: { type: object }
            replay:
              # Completeness of missed_events; v3+ recipients only (absent on
              # the v2 wire). See the ReplayStatus schema for the contract.
              $ref: '#/components/schemas/ReplayStatus'
            sender_watermarks:
              type: array
              description: >-
                v3+ recipients only (absent on the v2 wire). Authoritative
                per-sender `(epoch, seq)` baselines for current room members;
                required to classify gaps after GameData skipped during the
                reconnecting client's absence.
              items: { $ref: '#/components/schemas/SenderWatermark' }
            reconnection_token:
              type: string
              description: >-
                Fresh (rotated) reconnection token replacing the one just
                used (v3+ recipients only; absent on the v2 wire). Store it
                for the next unexpected disconnect; the previous token is no
                longer claimable.
      required: [type, data]
    ReconnectionFailed:
      type: object
      properties:
        type: { const: ReconnectionFailed }
        data:
          type: object
          required: [reason, error_code]
          properties:
            reason: { type: string }
            error_code: { $ref: '#/components/schemas/ErrorCode' }
      required: [type, data]
    PlayerReconnected:
      type: object
      properties:
        type: { const: PlayerReconnected }
        data:
          type: object
          required: [player_id]
          properties:
            player_id: { $ref: '#/components/schemas/PlayerId' }
            epoch:
              type: integer
              minimum: 1
              maximum: 4294967295
              description: >-
                v3 only: the reconnector's new incarnation epoch (see
                ServerGameData.epoch) — the same value now stamped on its relayed
                GameData — so recipients re-baseline the per-sender (epoch, seq)
                stream immediately. Absent for pre-v3 recipients (byte-identical
                wire).
      required: [type, data]
    SpectatorJoined:
      type: object
      description: Payload is a flattened SpectatorJoinedPayload (boxed newtype variant).
      properties:
        type: { const: SpectatorJoined }
        data:
          type: object
          required:
            - room_id
            - room_code
            - spectator_id
            - game_name
            - current_players
            - current_spectators
            - lobby_state
          properties:
            room_id: { $ref: '#/components/schemas/RoomId' }
            room_code: { type: string }
            spectator_id: { $ref: '#/components/schemas/PlayerId' }
            game_name: { type: string }
            current_players:
              type: array
              items: { $ref: '#/components/schemas/PlayerInfo' }
            current_spectators:
              type: array
              items: { $ref: '#/components/schemas/SpectatorInfo' }
            lobby_state: { $ref: '#/components/schemas/LobbyState' }
            reason: { $ref: '#/components/schemas/SpectatorStateChangeReason' }
      required: [type, data]
    SpectatorJoinFailed:
      type: object
      properties:
        type: { const: SpectatorJoinFailed }
        data:
          type: object
          required: [reason]
          properties:
            reason: { type: string }
            error_code: { $ref: '#/components/schemas/ErrorCode' }
      required: [type, data]
    SpectatorLeft:
      type: object
      properties:
        type: { const: SpectatorLeft }
        data:
          type: object
          properties:
            room_id: { $ref: '#/components/schemas/RoomId' }
            room_code: { type: string }
            reason: { $ref: '#/components/schemas/SpectatorStateChangeReason' }
            current_spectators:
              type: array
              items: { $ref: '#/components/schemas/SpectatorInfo' }
      required: [type, data]
    NewSpectatorJoined:
      type: object
      properties:
        type: { const: NewSpectatorJoined }
        data:
          type: object
          required: [spectator]
          properties:
            spectator: { $ref: '#/components/schemas/SpectatorInfo' }
            current_spectators:
              type: array
              items: { $ref: '#/components/schemas/SpectatorInfo' }
            reason: { $ref: '#/components/schemas/SpectatorStateChangeReason' }
      required: [type, data]
    SpectatorDisconnected:
      type: object
      properties:
        type: { const: SpectatorDisconnected }
        data:
          type: object
          required: [spectator_id]
          properties:
            spectator_id: { $ref: '#/components/schemas/PlayerId' }
            reason: { $ref: '#/components/schemas/SpectatorStateChangeReason' }
            current_spectators:
              type: array
              items: { $ref: '#/components/schemas/SpectatorInfo' }
      required: [type, data]
    Error:
      type: object
      properties:
        type: { const: Error }
        data:
          type: object
          required: [message]
          properties:
            message: { type: string }
            error_code: { $ref: '#/components/schemas/ErrorCode' }
      required: [type, data]
    PeerTransportStatus:
      type: object
      description: 'v3 only. Informational fan-out of an accepted TransportStatus.'
      properties:
        type: { const: PeerTransportStatus }
        data:
          type: object
          required: [peer_id, transport, connected]
          properties:
            peer_id: { $ref: '#/components/schemas/PlayerId' }
            transport: { $ref: '#/components/schemas/Transport' }
            connected: { type: boolean }
      required: [type, data]
    RelayStats:
      type: object
      description: >-
        v3 only, config-gated (websocket.delivery_stats_interval_secs > 0;
        default 0 = disabled) and never emitted to a connection that
        negotiated below v3 (enforced at emission). Counters are CUMULATIVE
        since the connection registered and survive a reconnection's
        player-id reassignment, so a frame skipped while the connection's
        queue is full (the frame is advisory and never waits) loses nothing.
        Intended use: aggregate diagnostics. Exact sequence-gap attribution is
        carried by DeliveryReport; dropped_for_you remains the frozen aggregate
        count for this connection. backpressure_events rising means this
        connection is draining too slowly and is pacing reliable senders toward
        a SLOW_CONSUMER disconnect.
      properties:
        type: { const: RelayStats }
        data:
          type: object
          required: [interval_ms, sent_to_you, dropped_for_you, backpressure_events]
          properties:
            interval_ms:
              type: integer
              minimum: 1
              description: Configured emission interval in milliseconds.
            sent_to_you:
              type: integer
              minimum: 0
              description: >-
                Messages the delivery layer accepted (enqueued) for this
                connection since it registered (excludes RelayStats itself).
            dropped_for_you:
              type: integer
              minimum: 0
              description: >-
                Messages abandoned for this connection: undeliverable-encoding
                replacements while connected, plus slow-consumer timeout
                drops (which coincide with this connection's disconnect).
            backpressure_events:
              type: integer
              minimum: 0
              description: >-
                Deliveries that had to wait on this connection's momentarily
                full outbound queue.
      required: [type, data]
    GoingAway:
      type: object
      description: >-
        v3 only. Best-effort graceful-shutdown advisory emitted when the
        server starts draining. The WebSocket close frame with code 4000 is
        authoritative; pre-v3 clients receive only that close frame.
      properties:
        type: { const: GoingAway }
        data:
          type: object
          required: [deadline_ms]
          properties:
            deadline_ms:
              type: integer
              description: Unix epoch millisecond deadline when the server will force close.
            retry_after_secs:
              type: integer
              nullable: true
              description: Optional operator retry hint.
      required: [type, data]
    DeliveryReport:
      type: object
      description: >-
        Protocol-v3 delivery accountability for this connection. Per-class
        counters are cumulative. Each gaps entry is a newly-accounted exact
        inclusive range and is delivered on the priority control lane before
        any later GameData can expose that gap. A client authorizes a hole only
        when the union of prior non-overlapping ranges covers every missing
        sequence. Each loss-counter delta equals the current report's range units
        for that reason. Counter-only snapshots omit gaps.
      properties:
        type: { const: DeliveryReport }
        data:
          type: object
          required: [per_class]
          properties:
            per_class: { $ref: '#/components/schemas/DeliveryCountersByClass' }
            gaps:
              type: array
              minItems: 1
              maxItems: 256
              items: { $ref: '#/components/schemas/DeliveryGap' }
              description: >-
                Exact newly-accounted ranges; omitted on a counter-only snapshot.
                Additional non-mergeable ranges roll into later priority reports.
      required: [type, data]
