# Docs validation pipeline for signal-fish-client
#
# Runs on every push to main and on all pull requests that touch
# markdown files, documentation config, or this workflow itself.
# Jobs: markdownlint, link-check, spell-check, rendering-check
#
# Cancel in-progress runs on the same branch to save resources.

name: Docs Validation

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "docs/**"
      - ".markdownlint.json"
      - ".markdownlint-cli2.jsonc"
      - ".lychee.toml"
      - ".typos.toml"
      - "mkdocs.yml"
      - "hooks/**"
      - "requirements-docs.txt"
      - "scripts/check-docs-rendering.sh"
      - ".github/workflows/docs-validation.yml"
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"
      - ".markdownlint.json"
      - ".markdownlint-cli2.jsonc"
      - ".lychee.toml"
      - ".typos.toml"
      - "mkdocs.yml"
      - "hooks/**"
      - "requirements-docs.txt"
      - "scripts/check-docs-rendering.sh"
      - ".github/workflows/docs-validation.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Markdownlint — lint markdown files for style consistency
  # ──────────────────────────────────────────────────────────────
  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23.1.0
        with:
          globs: |
            **/*.md

  # ──────────────────────────────────────────────────────────────
  # Link check — verify all URLs in markdown files resolve
  # ──────────────────────────────────────────────────────────────
  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: >-
            --config .lychee.toml
            "**/*.md"
          fail: true

  # ──────────────────────────────────────────────────────────────
  # Spell check — catch typos in source and documentation
  # Note: typos scans all project files (not just markdown) which
  # also catches typos in Rust source, TOML configs, YAML, etc.
  # ──────────────────────────────────────────────────────────────
  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Run typos spell checker
        uses: crate-ci/typos@v1.46.0
        with:
          config: .typos.toml

  # ──────────────────────────────────────────────────────────────
  # Rendering check — verify MkDocs builds cleanly and code blocks
  # render with proper syntax highlighting (no raw fence leakage,
  # no unresolved rustdoc annotations like rust,ignore).
  # ──────────────────────────────────────────────────────────────
  rendering-check:
    name: Rendering Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-docs.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install MkDocs dependencies
        run: pip install -r requirements-docs.txt

      - name: Run docs rendering check
        run: bash scripts/check-docs-rendering.sh
