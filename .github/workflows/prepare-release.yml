name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Validate and show the release changes without pushing a branch
        required: true
        default: true
        type: boolean

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

env:
  RELEASE_RUST: "1.96.1"

jobs:
  prepare:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Require the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_NAME" != "$DEFAULT_BRANCH" ]; then
            printf '::error::Prepare Release must run from %s, not %s.\n' "$DEFAULT_BRANCH" "$REF_NAME"
            exit 1
          fi

      - name: Checkout default-branch HEAD
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned release Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RELEASE_RUST }}
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Test release tooling
        run: >-
          python3 -m unittest scripts/test_release.py scripts/test_required_checks.py
          scripts/test_audit_repository_rules.py

      - name: Derive release intent
        id: intent
        run: |
          python3 scripts/release.py release-intent > "$RUNNER_TEMP/release-intent.json"
          jq . "$RUNNER_TEMP/release-intent.json"
          {
            printf 'bump=%s\n' "$(jq -r '.bump' "$RUNNER_TEMP/release-intent.json")"
            printf 'breaking=%s\n' "$(jq -r '.breaking' "$RUNNER_TEMP/release-intent.json")"
            printf 'target=%s\n' "$(jq -r '.target' "$RUNNER_TEMP/release-intent.json")"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare release files
        id: version
        env:
          BUMP: ${{ steps.intent.outputs.bump }}
          BREAKING: ${{ steps.intent.outputs.breaking }}
        run: |
          args=()
          if [ "$BREAKING" = true ]; then
            args+=(--breaking)
          fi
          version=$(python3 scripts/release.py prepare "$BUMP" "${args[@]}")
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'branch=release/%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Run mandatory verification
        run: cargo fmt --all -- --check && cargo clippy --workspace --all-targets --all-features -- -D warnings && cargo test --workspace --all-features

      - name: Verify every publishable package and documentation
        run: |
          python3 scripts/release.py workspace-plan > "$RUNNER_TEMP/workspace-plan.json"
          mapfile -t packages < <(jq -r '.packages[].name' "$RUNNER_TEMP/workspace-plan.json")
          package_args=()
          for package in "${packages[@]}"; do
            package_args+=(-p "$package")
          done
          cargo package --allow-dirty "${package_args[@]}"
          cargo publish --dry-run --allow-dirty "${package_args[@]}"
          rustup toolchain install nightly --profile minimal
          bash scripts/check-docsrs.sh

      - name: Show dry-run changes
        if: inputs.dry_run
        run: git diff --check && git diff --stat && git diff

      - name: Commit release preparation
        if: ${{ !inputs.dry_run }}
        env:
          BRANCH: ${{ steps.version.outputs.branch }}
          VERSION: ${{ steps.version.outputs.version }}
          BREAKING: ${{ steps.intent.outputs.breaking }}
        run: |
          git switch -c "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --update
          git diff --cached --check
          if git diff --cached --quiet; then
            printf '::error::Release preparation produced no tracked changes.\n'
            exit 1
          fi
          subject="chore: prepare release ${VERSION}"
          if [ "$BREAKING" = true ]; then
            subject="chore!: prepare release ${VERSION}"
          fi
          git commit -m "$subject"
          git push --set-upstream origin "$BRANCH"

      - name: Open release pull request
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.version.outputs.branch }}
          VERSION: ${{ steps.version.outputs.version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BREAKING: ${{ steps.intent.outputs.breaking }}
        run: |
          title="chore: prepare release ${VERSION}"
          if [ "$BREAKING" = true ]; then
            title="chore!: prepare release ${VERSION}"
          fi
          {
            printf 'Automated release preparation for %s.\n\n' "$VERSION"
            printf '%s\n' \
              'The built-in workflow token explicitly dispatches every required check for this commit.' \
              'Merge only after every required check and review is green.'
          } > "$RUNNER_TEMP/release-pr.md"
          pr_url=$(gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH" \
            --title "$title" \
            --body-file "$RUNNER_TEMP/release-pr.md")
          printf 'Opened %s\n' "$pr_url"

      - name: Dispatch required checks for the release pull request
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.version.outputs.branch }}
          VERSION: ${{ steps.version.outputs.version }}
          BREAKING: ${{ steps.intent.outputs.breaking }}
        run: |
          base_sha=$(git rev-parse HEAD^)
          title="chore: prepare release ${VERSION}"
          if [ "$BREAKING" = true ]; then
            title="chore!: prepare release ${VERSION}"
          fi
          while IFS= read -r workflow; do
            if [ "$workflow" = semver-checks.yml ]; then
              gh workflow run "$workflow" --ref "$BRANCH" \
                -f "base_sha=${base_sha}" -f "pr_title=${title}"
            else
              gh workflow run "$workflow" --ref "$BRANCH"
            fi
          done < <(jq -r '.required_checks[].file' .github/required-checks.json)
