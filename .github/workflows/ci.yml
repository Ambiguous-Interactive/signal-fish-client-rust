# CI pipeline for signal-fish-client
#
# Runs on every push to main and on all pull requests.
# Jobs: fmt → clippy, test, msrv, doc, deny → publish-dry-run
#
# Cancel in-progress runs on the same branch to save resources.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Deny warnings in CI for doc builds
  RUSTDOCFLAGS: "-D warnings"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Formatting — fastest check, runs first
  # ──────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ──────────────────────────────────────────────────────────────
  # Spell check — typos scans the WHOLE repository (Rust source,
  # TOML, YAML, Markdown, …), so it lives here in the always-on CI
  # rather than the path-filtered docs-validation workflow. That
  # guarantees it runs on every change, including Rust-only PRs.
  # Standalone and fast (~seconds): no Rust toolchain, no `needs`.
  # ──────────────────────────────────────────────────────────────
  spell-check:
    name: Spell Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Run typos spell checker
        uses: crate-ci/typos@v1.48.0
        with:
          config: .typos.toml

  # ──────────────────────────────────────────────────────────────
  # Clippy — lint check across feature combinations
  # ──────────────────────────────────────────────────────────────
  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            flags: ""
          - name: all-features
            flags: "--all-features"
          - name: no-default-features
            flags: "--no-default-features"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets ${{ matrix.flags }} -- -D warnings

  # ──────────────────────────────────────────────────────────────
  # Tests — run across feature combinations
  # ──────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            flags: ""
          - name: all-features
            flags: "--all-features"
          - name: no-default-features
            flags: "--no-default-features"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
      - name: Run tests
        run: cargo test --workspace ${{ matrix.flags }}

  # ──────────────────────────────────────────────────────────────
  # MSRV — verify minimum supported Rust version (1.87.0)
  # ──────────────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.87.0)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fmt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Install MSRV Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.87.0
      - name: Install packaging Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
      - name: Create isolated core package tree
        run: |
          core_dir="$RUNNER_TEMP/signal-fish-core-msrv"
          core_version=$(python3 scripts/release.py package-version)
          mkdir -p "$core_dir"
          cargo +1.96.1 package --locked --package signal-fish-client --no-verify
          tar -xzf "target/package/signal-fish-client-${core_version}.crate" \
            --strip-components=1 -C "$core_dir"
      - name: Verify isolated core metadata has no Godot packages
        run: |
          cargo +1.87.0 metadata --locked --format-version 1 \
            --manifest-path "$RUNNER_TEMP/signal-fish-core-msrv/Cargo.toml" \
            > "$RUNNER_TEMP/core-metadata.json"
          python3 -c 'import json,sys; data=json.load(open(sys.argv[1])); assert all(not p["name"].startswith("godot") for p in data["packages"])' \
            "$RUNNER_TEMP/core-metadata.json"
      - name: Compile isolated core tests with MSRV
        run: cargo +1.87.0 test --locked --manifest-path "$RUNNER_TEMP/signal-fish-core-msrv/Cargo.toml" --all-features --no-run
      - name: Test isolated core library with MSRV
        run: cargo +1.87.0 test --locked --manifest-path "$RUNNER_TEMP/signal-fish-core-msrv/Cargo.toml" --all-features --lib

  # ──────────────────────────────────────────────────────────────
  # Adapter MSRV — godot-rust 0.5 requires a newer compiler than core
  # ──────────────────────────────────────────────────────────────
  adapter-msrv:
    name: Godot adapter MSRV (1.94.0)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: fmt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Install adapter Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
      - name: Generate workspace lockfile
        run: bash scripts/cargo-retry.sh generate-lockfile
      - name: Test adapter with its MSRV
        run: cargo test --locked -p signal-fish-client-godot

  # ──────────────────────────────────────────────────────────────
  # Documentation — ensure docs build cleanly
  # ──────────────────────────────────────────────────────────────
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fmt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
      - name: Build documentation
        run: cargo doc --workspace --all-features --no-deps
      - name: Install nightly toolchain
        run: rustup toolchain install nightly --profile minimal
      - name: Verify docs.rs compatibility
        run: bash scripts/check-docsrs.sh

  # ──────────────────────────────────────────────────────────────
  # cargo-deny — license and advisory audit
  # ──────────────────────────────────────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fmt
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2.1.1

  # ──────────────────────────────────────────────────────────────
  # Publish dry-run — verify crate packages correctly
  # Depends on tests and clippy passing first.
  # ──────────────────────────────────────────────────────────────
  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [clippy, test, msrv, adapter-msrv, doc, deny]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
      - name: Run publish dry-run
        run: |
          python3 scripts/release.py workspace-plan > "$RUNNER_TEMP/workspace-plan.json"
          mapfile -t packages < <(jq -r '.packages[].name' "$RUNNER_TEMP/workspace-plan.json")
          package_args=()
          for package in "${packages[@]}"; do
            package_args+=(-p "$package")
          done
          cargo publish --dry-run "${package_args[@]}"

  required:
    name: CI Required
    if: ${{ always() }}
    needs: [fmt, spell-check, clippy, test, msrv, adapter-msrv, doc, deny, publish-dry-run]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every CI job
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failures=$(jq -r 'to_entries[] | select(.value.result != "success") | "\(.key)=\(.value.result)"' <<< "$NEEDS_JSON")
          if [ -n "$failures" ]; then
            printf '::error::Required jobs did not succeed:\n%s\n' "$failures"
            exit 1
          fi
