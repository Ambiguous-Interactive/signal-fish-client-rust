# Protocol wire-sample drift detector for signal-fish-client
#
# Weekly (and on demand) re-fetches the Signal Fish server's published protocol
# samples and fails loudly if the vendored copies under tests/wire-samples/ have
# drifted from upstream. Fail-closed: a human runs the refresh procedure in
# .llm/skills/protocol-wire-conformance.md and reconciles any client type changes.
#
# The concurrency group includes the event name so scheduled and manual runs on
# the same ref do not cancel each other.

name: Protocol Sync

on:
  schedule:
    # Mondays at 05:00 UTC — staggered from the other scheduled workflows.
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ──────────────────────────────────────────────────────────────
  # wire-drift — compare vendored protocol samples against upstream
  # ──────────────────────────────────────────────────────────────
  wire-drift:
    name: Vendored wire samples vs upstream
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Compare vendored samples to upstream and fail on drift
        run: |
          set -euo pipefail
          base="https://raw.githubusercontent.com/Ambiguous-Interactive/signal-fish-server/main/.llm/code-samples/protocol"
          drift=0
          for f in v2-client-messages v2-server-messages v3-client-messages v3-server-messages; do
            curl -fsS "$base/$f.jsonl" -o "/tmp/$f.jsonl"
            if ! diff -q "tests/wire-samples/$f.jsonl" "/tmp/$f.jsonl" >/dev/null 2>&1; then
              echo "::error::wire-sample drift detected in $f.jsonl — upstream changed"
              diff "tests/wire-samples/$f.jsonl" "/tmp/$f.jsonl" || true
              drift=1
            fi
          done
          if [ "$drift" -ne 0 ]; then
            echo "Upstream protocol samples have drifted from the vendored copies."
            echo "Refresh per .llm/skills/protocol-wire-conformance.md and reconcile any type changes."
            exit 1
          fi
          echo "Vendored wire samples are in sync with upstream."
