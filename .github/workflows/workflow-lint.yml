# Workflow lint and hygiene checks for signal-fish-client
#
# Runs on every push to main and on all pull requests so its stable aggregate
# gate reports on every protected-branch candidate.
# Jobs: actionlint — workflow syntax, yamllint — YAML style, shellcheck — shell scripts,
#        devcontainer-compat — cross-platform devcontainer validation
#
# Cancel in-progress runs on the same branch to save resources.

name: Workflow Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # actionlint — validate GitHub Actions workflow syntax and semantics
  # ──────────────────────────────────────────────────────────────
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version: stable
          cache: false

      - name: Install actionlint
        # Pinned version — bump manually; not covered by Dependabot
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      - name: Run actionlint
        run: actionlint -color

  # ──────────────────────────────────────────────────────────────
  # yamllint — validate YAML style and syntax of workflow files
  # ──────────────────────────────────────────────────────────────
  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1

      - name: Install yamllint
        run: pip install 'yamllint>=1.35,<2'

      - name: Run yamllint
        run: yamllint --strict .github/workflows/ .github/dependabot.yml .yamllint.yml

  # ──────────────────────────────────────────────────────────────
  # shellcheck — lint shell scripts in scripts/ directory
  # ──────────────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1

      - name: Run shellcheck
        run: shellcheck scripts/*.sh .devcontainer/scripts/*.sh

  # ──────────────────────────────────────────────────────────────
  # devcontainer-compat — validate cross-platform devcontainer behavior
  # ──────────────────────────────────────────────────────────────
  devcontainer-compat:
    name: Devcontainer compat
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1

      - name: Validate devcontainer cross-platform compatibility
        run: bash scripts/check-devcontainer-compat.sh

      - name: Run devcontainer compat unit tests
        run: bash scripts/test_check_devcontainer_compat.sh

      - name: Check devcontainer Dockerfile
        run: docker buildx build --check -f .devcontainer/Dockerfile .

  required:
    name: Workflow Lint Required
    if: ${{ always() }}
    needs: [actionlint, yamllint, shellcheck, devcontainer-compat]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require every workflow lint job
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failures=$(jq -r 'to_entries[] | select(.value.result != "success") | "\(.key)=\(.value.result)"' <<< "$NEEDS_JSON")
          if [ -n "$failures" ]; then
            printf '::error::Required jobs did not succeed:\n%s\n' "$failures"
            exit 1
          fi
