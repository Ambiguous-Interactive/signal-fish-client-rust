# Semver API compatibility checks for signal-fish-client
#
# Runs on every push to main and on all pull requests.
# Ensures public API changes follow semantic versioning rules.
#
# Jobs:
#   semver-checks — verify API compatibility with cargo-semver-checks
#
# Push-to-main strategy:
#   1. Check whether the crate has been published on crates.io.
#   2. If published, run cargo-semver-checks against the latest release.
#   3. If not yet published, skip the crates.io baseline check (no baseline
#      exists to compare against).
#
# Cancel in-progress runs on the same branch to save resources.

name: Semver Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      base_sha:
        description: Base commit for an explicitly dispatched candidate
        required: true
        type: string
      pr_title:
        description: Candidate title used to authorize breaking changes
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ──────────────────────────────────────────────────────────────
  # semver-checks — verify public API compatibility
  #
  # For PRs, compares the PR code against the base branch.
  # For pushes to main, compares against the latest crates.io
  # release (gracefully skipped if the crate is not yet published).
  # ──────────────────────────────────────────────────────────────
  semver-checks:
    name: API compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2.83.4
        with:
          tool: cargo-semver-checks@0.46.0

      - name: Generate lockfile
        run: bash scripts/cargo-retry.sh generate-lockfile

      - name: Classify PR release type
        id: pr-release-type
        if: github.event_name != 'push'
        env:
          PR_TITLE: ${{ github.event.pull_request.title || inputs.pr_title }}
        run: |
          if [[ "$PR_TITLE" == *"!:"* ]]; then
            echo "release-type=major" >> "$GITHUB_OUTPUT"
            echo "Conventional breaking-change marker found; checking with major compatibility policy."
          else
            echo "release-type=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Check every publishable crate against the PR base
        if: github.event_name != 'push'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || inputs.base_sha }}
          RELEASE_TYPE: ${{ steps.pr-release-type.outputs.release-type }}
        run: |
          python3 scripts/release.py workspace-plan > "$RUNNER_TEMP/workspace-plan.json"
          while IFS=$'\t' read -r package manifest; do
            if ! git cat-file -e "${BASE_SHA}:${manifest}" 2>/dev/null; then
              printf 'Skipping %s: package does not exist on the base branch.\n' "$package"
              continue
            fi
            args=(--package "$package" --baseline-rev "$BASE_SHA")
            if [ "$RELEASE_TYPE" = major ]; then
              args+=(--release-type major)
            fi
            cargo semver-checks check-release "${args[@]}"
          done < <(jq -r '.packages[] | [.name, .manifest_path] | @tsv' \
            "$RUNNER_TEMP/workspace-plan.json")

      - name: Check every published crate against crates.io
        if: github.event_name == 'push'
        run: |
          python3 scripts/release.py workspace-plan > "$RUNNER_TEMP/workspace-plan.json"
          RELEASE_TYPE=$(python3 scripts/release.py current-semver-policy)
          while IFS= read -r package; do
            if ! search_output="$(
              CARGO_TERM_COLOR=never bash scripts/cargo-retry.sh search "$package" --limit 1 2>&1
            )"; then
              printf '::error::Could not query crates.io for %s.\n%s\n' "$package" "$search_output"
              exit 1
            fi
            if printf '%s\n' "$search_output" | grep -q "^${package} ="; then
              cargo semver-checks check-release --package "$package" \
                --release-type "$RELEASE_TYPE"
            else
              printf 'Skipping %s: no crates.io baseline exists.\n' "$package"
            fi
          done < <(jq -r '.packages[].name' "$RUNNER_TEMP/workspace-plan.json")

  required:
    name: Semver Required
    if: ${{ always() }}
    needs: [semver-checks]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require semantic-version compatibility
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          failures=$(jq -r 'to_entries[] | select(.value.result != "success") | "\(.key)=\(.value.result)"' <<< "$NEEDS_JSON")
          if [ -n "$failures" ]; then
            printf '::error::Required jobs did not succeed:\n%s\n' "$failures"
            exit 1
          fi
